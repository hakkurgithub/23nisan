<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - 23 Nisan</title>
    <style>
        body { font-family: sans-serif; padding: 1rem; background: #eee; }
        .box { background: white; padding: 1.5rem; border-radius: 10px; max-width: 500px; margin: auto; }
        input, textarea, select { width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #E63946; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; margin-top: 10px; }
        .delete-btn { background: #333; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="login" class="box">
        <h3>Admin Girişi</h3>
        <input type="password" id="pass" placeholder="Şifre (admin123)">
        <button onclick="if(document.getElementById('pass').value=='admin123'){document.getElementById('main').style.display='block';document.getElementById('login').style.display='none';renderList();}">Giriş</button>
    </div>

    <div id="main" class="box" style="display:none">
        <h3>Yazı Ekle</h3>
        <input type="text" id="t" placeholder="Başlık">
        <select id="c"><option value="gelisim">Çocuk Gelişimi</option><option value="aktivite">Aktivite</option></select>
        <select id="type" onchange="document.getElementById('v').style.display=this.value=='video'?'block':'none'"><option value="img">Resimli Makale</option><option value="video">Video</option></select>
        <input type="url" id="v" style="display:none" placeholder="YouTube Linki">
        <input type="file" id="img" accept="image/*">
        <textarea id="cont" rows="4" placeholder="İçerik..."></textarea>
        <button onclick="save()">Yayınla</button>
        <hr>
        <div id="list"></div>
    </div>

    <script>
        let imgData = "";
        document.getElementById('img').onchange = function(e) {
            let reader = new FileReader();
            reader.onload = function() { imgData = reader.result; };
            reader.readAsDataURL(e.target.files[0]);
        };

        function save() {
            let posts = JSON.parse(localStorage.getItem('myBlogData')) || [];
            posts.push({
                id: Date.now(),
                title: document.getElementById('t').value,
                category: document.getElementById('c').value,
                type: document.getElementById('type').value,
                videoUrl: document.getElementById('v').value,
                image: imgData,
                content: document.getElementById('cont').value,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('myBlogData', JSON.stringify(posts));
            alert("Eklendi!");
            location.reload();
        }

        function renderList() {
            let posts = JSON.parse(localStorage.getItem('myBlogData')) || [];
            document.getElementById('list').innerHTML = posts.map(p => `
                <div class="list-item"><span>${p.title}</span><button class="delete-btn" onclick="del(${p.id})">Sil</button></div>
            `).join('');
        }

        function del(id) {
            let posts = JSON.parse(localStorage.getItem('myBlogData')).filter(p => p.id !== id);
            localStorage.setItem('myBlogData', JSON.stringify(posts));
            renderList();
        }
    </script>
</body>
</html>
