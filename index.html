<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23 Nisan Portali</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .header { background: #E63946; color: white; padding: 1.5rem; text-align: center; }
        .nav { background: #1D3557; padding: 1rem; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; padding: 10px 20px; border-radius: 20px; background: rgba(255,255,255,0.1); font-weight: bold; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .card { background: white; border-radius: 15px; padding: 2rem; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn { display: inline-block; background: #E63946; color: white; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; margin-top: 1rem; }
    </style>
</head>
<body>
    <header class="header"><h1>23 Nisan Portali</h1></header>
    <nav class="nav">
        <a href="index.html">Ana Sayfa</a>
        <a href="blog.html">Ebeveyn Blogu</a>
    </nav>
    <div class="container">
        <div class="cards">
            <div class="card"><h3>Oyunlar</h3><a href="#" class="btn">Oyna</a></div>
            <div class="card"><h3>Atölyeler</h3><a href="#" class="btn">Başla</a></div>
            <div class="card"><h3>Ebeveyn Blogu</h3><a href="blog.html" class="btn" style="background:#1D3557">Yazıları Oku</a></div>
        </div>
    </div>
</body>
</html>
